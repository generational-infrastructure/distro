# Distro Calamares config.
#
# Forked from calamares-nixos-extensions/config/settings.conf.
# Differences vs upstream:
#   - `packagechooser` show step removed (distro always installs niri).
#   - `notesqml@unfree` show step + `instances:` entry removed (was the
#     companion unfree-warning page for packagechooser).
# Everything else (modules-search, branding, prompt flags, …) inherited.

modules-search: [ local, @out@/lib/calamares/modules ]

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - users
  - partition
  - summary
- exec:
  - partition
  - mount
  - nixos
  - users
  - umount
- show:
  - finished

branding: nixos

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
